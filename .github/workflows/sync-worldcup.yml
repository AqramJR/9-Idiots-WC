name: Sync World Cup data

# Runs automatically every 15 minutes, and can also be triggered manually
# from the Actions tab in GitHub ("Run workflow" button).
#
# This is what makes matches/results "live" without you having to run
# anything by hand: it re-imports the latest World Cup matches/results from
# football-data.org (safe to re-run — matches are upserted, never duplicated)
# and then recalculates every player's points so the leaderboard reflects
# the new scores automatically.
on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch: {}

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Write Firebase service account key
        run: echo "${{ secrets.FIREBASE_SERVICE_ACCOUNT_BASE64 }}" | base64 -d > serviceAccountKey.json

      - name: Sync matches and recalculate standings
        env:
          FOOTBALL_DATA_API_KEY: ${{ secrets.FOOTBALL_DATA_API_KEY }}
        run: npm run sync
